<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
    

    <!-- Bootstrap icons -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- ----------------- -->
</head>
<body>
    <header id="header">
        <div class="interface">
            <div class="logo">
                <img src="imagnes/Coffe-Logo.png" alt="Logo Café">
            </div>

            <button class="menu-mobile" id="menu-mobile">
                <i class="bi bi-list"></i>
            </button>

            <nav class="nav-bar" id="nav-bar">
                <ul class="nav-list">
                    <li><a href="#">Opção</a></li> <!-- Linkar cada link com as seções da pagina-->
                    <li><a href="#">Opção</a></li>
                    <li><a href="#">Opção</a></li>
                    <li><a href="#">Opção</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main">
        <div class="interface">
            <div class="grid-container">
                <section class="hero-banner">
                    <div class="hero-itens">
                        <div class="hero-img">
                            <img src="imagnes/café-banner.png" alt="">
                        </div>
                        <div class="hero-txt">
                            <h1>Venha tomar os <span>Melhores cafés</span></h1>
                            <p>Café quentinho e fresquinho para você</p>
                            <button class="btn btn-contato">
                                Contato
                            </button>
                        </div>
                    </div>
                </section>

                <div class="mais-vendidos">
                    <h2>Veja os mais vendido</h2>
                </div>
                <section class="card-bloco card-1">
                    <div class="card">
                        <div class="img-card">
                            <img src="imagnes/cappuccino.png" alt="Cappucchino">
                        </div>
                        <p>5 <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i></p>
                        <div class="nome-card">
                            <h3>Cappuchino</h3>
                        </div>
                    </div>
                </section>

                <section class="card-bloco card-2">
                    <div class="card">
                        <div class="img-card">
                            <img src="imagnes/Macchiato.png" alt="Macchiato">
                        </div>
                        <p>5 <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i></p>
                        <div class="nome-card">
                            <h3>Macchiato</h3>
                        </div>
                    </div>
                </section>

                <section class="card-bloco card-3">
                    <div class="card">
                        <div class="img-card">
                            <img src="imagnes/Expresso.png" alt="Expresso">
                        </div>
                        <p>5 <i class="fa-solid fa-star" style="color: rgb(255, 212, 59);"></i></p>
                        <div class="nome-card">
                            <h3>Expresso</h3>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

   

    <script src="scripts/menu-moile.js"></script>
    <script src="https://kit.fontawesome.com/3a4a8b30ac.js" crossorigin="anonymous"></script>

</body>
</html>
